<script>
    // Dark Mode Check
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }

    // NCERT Codes Dictionary (Official PDF Link ke liye)
    // format: [English_Code, Hindi_Code]
    const bookCodes = {
        "11": {
            "Biology": ["kebo1", "hlbo1"],
            "Physics Part 1": ["keph1", "hlph1"],
            "Physics Part 2": ["keph2", "hlph2"],
            "Chemistry Part 1": ["kech1", "hlch1"],
            "Chemistry Part 2": ["kech2", "hlch2"],
            "Mathematics": ["kemh1", "hlmh1"]
        },
        "12": {
            "Biology": ["lebo1", "llbo1"],
            "Physics Part 1": ["leph1", "llph1"],
            "Physics Part 2": ["leph2", "llph2"],
            "Chemistry Part 1": ["lech1", "llch1"],
            "Chemistry Part 2": ["lech2", "llch2"],
            "Mathematics Part 1": ["lemh1", "llmh1"],
            "Mathematics Part 2": ["lemh2", "llmh2"]
        }
    };

    // Chapter Names Data
    const chapterData = {
        "11": {
            "Biology": ["The Living World", "Biological Classification", "Plant Kingdom", "Animal Kingdom", "Morphology of Flowering Plants", "Anatomy of Flowering Plants", "Structural Organisation in Animals", "Cell: The Unit of Life", "Biomolecules", "Cell Cycle and Cell Division", "Photosynthesis in Higher Plants", "Respiration in Plants", "Plant Growth and Development", "Breathing and Exchange of Gases", "Body Fluids and Circulation", "Excretory Products and their Elimination", "Locomotion and Movement", "Neural Control and Coordination", "Chemical Coordination and Integration"],
            "Physics Part 1": ["Units and Measurements", "Motion in a Straight Line", "Motion in a Plane", "Laws of Motion", "Work, Energy and Power", "System of Particles and Rotational Motion", "Gravitation"],
            "Physics Part 2": ["Mechanical Properties of Solids", "Mechanical Properties of Fluids", "Thermal Properties of Matter", "Thermodynamics", "Kinetic Theory", "Oscillations", "Waves"]
            // Chemistry aur Maths ke chapters bhi isi tarah add ho jayenge
        },
        "12": {
            "Biology": ["Sexual Reproduction in Flowering Plants", "Human Reproduction", "Reproductive Health", "Principles of Inheritance and Variation", "Molecular Basis of Inheritance", "Evolution", "Human Health and Disease", "Microbes in Human Welfare", "Biotechnology: Principles and Processes", "Biotechnology and its Applications", "Organisms and Populations", "Ecosystem", "Biodiversity and Conservation"],
            "Physics Part 1": ["Electric Charges and Fields", "Electrostatic Potential and Capacitance", "Current Electricity", "Moving Charges and Magnetism", "Magnetism and Matter", "Electromagnetic Induction", "Alternating Current", "Electromagnetic Waves"],
            "Physics Part 2": ["Ray Optics and Optical Instruments", "Wave Optics", "Dual Nature of Radiation and Matter", "Atoms", "Nuclei", "Semiconductor Electronics"]
        }
    };

    const medium = document.getElementById('medium');
    const classSelect = document.getElementById('classSelect');
    const subjectSelect = document.getElementById('subjectSelect');
    const chapterSelect = document.getElementById('chapterSelect');

    // 1. Class change hone par Subjects dikhao
    classSelect.addEventListener('change', function() {
        const cls = this.value;
        subjectSelect.innerHTML = '<option value="">-- Choose Subject --</option>';
        chapterSelect.innerHTML = '<option value="">-- Choose Chapter --</option>';
        
        if (cls && bookCodes[cls]) {
            Object.keys(bookCodes[cls]).forEach(sub => {
                subjectSelect.add(new Option(sub, sub));
            });
        }
    });

    // 2. Subject change hone par Chapters dikhao
    subjectSelect.addEventListener('change', function() {
        const cls = classSelect.value;
        const sub = this.value;
        chapterSelect.innerHTML = '<option value="">-- Choose Chapter --</option>';

        if (cls && sub && chapterData[cls][sub]) {
            chapterData[cls][sub].forEach((name, index) => {
                chapterSelect.add(new Option(`Ch ${index + 1}: ${name}`, index + 1));
            });
        } else {
            // Agar chapter list nahi hai toh bas number dikhao
            for(let i=1; i<=15; i++) {
                chapterSelect.add(new Option(`Chapter ${i}`, i));
            }
        }
    });

    // 3. Final PDF Link Open Karo
    function openNCERTPDF() {
        const med = medium.value;
        const cls = classSelect.value;
        const sub = subjectSelect.value;
        const ch = chapterSelect.value;

        if (!med || !cls || !sub || !ch) {
            alert("Bhai, saare options toh select karo!");
            return;
        }

        // Sahi code uthao (English = index 0, Hindi = index 1)
        const langIdx = (med === "hindi") ? 1 : 0;
        const code = bookCodes[cls][sub][langIdx];
        
        // Chapter number ko 2 digit banao (1 -> 01)
        const chNum = ch.toString().padStart(2, '0');

        // NCERT URL
        const url = `https://ncert.nic.in/textbook/pdf/${code}${chNum}.pdf`;
        window.open(url, '_blank');
    }
</script>
