<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCERT Solutions - Isher Education</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; background-color: #f4f4f9; text-align: center; transition: 0.3s; }
        
        /* Dark Mode */
        body.dark-mode { background-color: #121212; color: white; }
        body.dark-mode .filter-container { background: #1e1e1e; border: 1px solid #333; }
        body.dark-mode select { background: #333; color: white; border-color: #444; }

        .header { display: flex; align-items: center; margin-bottom: 20px; }
        .back-btn { text-decoration: none; font-size: 24px; margin-right: 15px; color: #2196F3; font-weight: bold; }

        .filter-container {
            max-width: 500px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .filter-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-weight: bold; color: #555; }
        body.dark-mode label { color: #bbb; }

        select {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 16px;
            outline: none;
        }

        .view-btn {
            width: 100%;
            padding: 15px;
            background: #4CAF50;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        .view-btn:hover { background: #45a049; }
    </style>
</head>
<body>

    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <h2>Explore NCERT</h2>
    </div>

    <div class="filter-container">
        <div class="filter-group">
            <label>Select Medium</label>
            <select id="medium">
                <option value="">-- Choose Medium --</option>
                <option value="hindi">Hindi (हिंदी)</option>
                <option value="english">English</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Select Class</label>
            <select id="classSelect">
                <option value="">-- Choose Class --</option>
                <option value="11">Class 11th</option>
                <option value="12">Class 12th</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Select Subject</label>
            <select id="subjectSelect">
                <option value="">-- Choose Subject --</option>
            </select>
        </div>

        <div class="filter-group">
            <label>Select Chapter</label>
            <select id="chapterSelect">
                <option value="">-- Choose Chapter --</option>
            </select>
        </div>

        <button class="view-btn" onclick="openNCERTPDF()">View PDF</button>
    </div>
<script>
    // Dark Mode Check
    if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
    }

    // NCERT Data (Class -> Subject -> Chapters)
    const ncertData = {
        "11": {
            "Biology": [
                "The Living World", "Biological Classification", "Plant Kingdom", 
                "Animal Kingdom", "Morphology of Flowering Plants"
            ],
            "Physics Part 1": [
                "Units and Measurements", "Motion in a Straight Line", "Motion in a Plane", 
                "Laws of Motion", "Work, Energy and Power"
            ],
            "Physics Part 2": [
                "Mechanical Properties of Solids", "Mechanical Properties of Fluids", 
                "Thermal Properties of Matter", "Thermodynamics", "Kinetic Theory"
            ]
        },
        "12": {
            "Biology": [
                "Sexual Reproduction in Flowering Plants", "Human Reproduction", 
                "Reproductive Health", "Principles of Inheritance and Variation"
            ],
            "Physics Part 1": [
                "Electric Charges and Fields", "Electrostatic Potential and Capacitance", 
                "Current Electricity", "Moving Charges and Magnetism"
            ],
            "Physics Part 2": [
                "Ray Optics and Optical Instruments", "Wave Optics", 
                "Dual Nature of Radiation and Matter", "Atoms", "Nuclei"
            ]
        }
    };

    const classSelect = document.getElementById('classSelect');
    const subjectSelect = document.getElementById('subjectSelect');
    const chapterSelect = document.getElementById('chapterSelect');

    // Jab Class badle toh Subjects update hon
    classSelect.addEventListener('change', function() {
        const selectedClass = this.value;
        subjectSelect.innerHTML = '<option value="">-- Choose Subject --</option>';
        chapterSelect.innerHTML = '<option value="">-- Choose Chapter --</option>';

        if (selectedClass && ncertData[selectedClass]) {
            Object.keys(ncertData[selectedClass]).forEach(subject => {
                let option = new Option(subject, subject);
                subjectSelect.add(option);
            });
        }
    });

    // Jab Subject badle toh Chapters update hon
    subjectSelect.addEventListener('change', function() {
        const selectedClass = classSelect.value;
        const selectedSubject = this.value;
        chapterSelect.innerHTML = '<option value="">-- Choose Chapter --</option>';

        if (selectedClass && selectedSubject && ncertData[selectedClass][selectedSubject]) {
            ncertData[selectedClass][selectedSubject].forEach((chapter, index) => {
                // Chapter Number (1, 2, 3...) ke saath naam
                let option = new Option(`Chapter ${index + 1}: ${chapter}`, index + 1);
                chapterSelect.add(option);
            });
        }
    });

    // View PDF Function (NCERT ki official links ke liye)
    function openNCERTPDF() {
        const medium = document.getElementById('medium').value;
        const cls = classSelect.value;
        const sub = subjectSelect.value;
        const ch = chapterSelect.value;

        if (!medium || !cls || !sub || !ch) {
            alert("Bhai, pehle saare options chun lo!");
            return;
        }

        // NCERT URL Structure Logic (Example)
        // Yahan hum NCERT ke short-codes use karte hain jaise 'kebo1' (Class 11 Bio)
        let bookCode = "";
        if(cls == "11") {
            if(sub == "Biology") bookCode = (medium == "hindi") ? "hlbo1" : "kebo1";
            if(sub == "Physics Part 1") bookCode = (medium == "hindi") ? "hlph1" : "keph1";
        }
        
        // Chapter number ko 2 digits me convert karna (01, 02...)
        let chCode = ch.padStart(2, '0');
        
        // Final PDF Link (NCERT Server)
        const finalLink = `https://ncert.nic.in/textbook/pdf/${bookCode}${chCode}.pdf`;
        
        window.open(finalLink, '_blank');
    }
</script>


</body>
</html>
