<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Settings - Isher Education</title>
    <style>
        body { 
            font-family: 'Segoe UI', Arial, sans-serif; 
            margin: 0; 
            padding: 20px; 
            transition: 0.3s; 
            background: #f4f4f9; 
            color: #333;
        }

        /* Dark Mode Colors for Settings Page */
        body.dark-mode { background: #121212; color: white; }
        body.dark-mode .setting-item { background: #1e1e1e; border: 1px solid #333; }
        body.dark-mode .back-btn { color: white; }

        .header { display: flex; align-items: center; margin-bottom: 30px; }
        .back-btn { text-decoration: none; font-size: 24px; margin-right: 15px; color: #333; font-weight: bold; }
        
        .setting-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .setting-text h3 { margin: 0; font-size: 18px; }
        .setting-text p { margin: 5px 0 0; font-size: 14px; color: #777; }

        /* --- Toggle Switch Styling --- */
        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 34px;
        }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 26px; width: 26px;
            left: 4px; bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #2196F3; }
        input:checked + .slider:before { transform: translateX(26px); }
    </style>
</head>
<body id="settingsBody">

    <div class="header">
        <a href="index.html" class="back-btn">←</a>
        <h2>Settings</h2>
    </div>

    <div class="setting-item">
        <div class="setting-text">
            <h3>Dark Mode</h3>
            <p>Switch between light and dark theme</p>
        </div>
        <label class="switch">
            <input type="checkbox" id="darkModeToggle" onclick="toggleDarkMode()">
            <span class="slider"></span>
        </label>
    </div>

    <script>
        const toggle = document.getElementById('darkModeToggle');

        // Check if Dark Mode was already ON
        function checkTheme() {
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
                toggle.checked = true;
            }
        }

        // Toggle Function
        function toggleDarkMode() {
            if (toggle.checked) {
                document.body.classList.add('dark-mode');
                localStorage.setItem('theme', 'dark');
            } else {
                document.body.classList.remove('dark-mode');
                localStorage.setItem('theme', 'light');
            }
        }

        // Run on page load
        checkTheme();
    </script>
</body>
</html>
