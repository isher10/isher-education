<!DOCTYPE html>
<html>

<head>
<title>Create Account</title>

<style>

body{
font-family:Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.box{
background:white;
padding:30px;
width:320px;
border-radius:10px;
text-align:center;
box-shadow:0px 0px 10px gray;
}

input,select{
width:90%;
padding:10px;
margin:8px;
border-radius:5px;
border:1px solid gray;
}

button{
background:#2196F3;
color:white;
padding:10px;
width:100%;
border:none;
border-radius:5px;
}

</style>

</head>

<body>

<div class="box">

<h2>Create Account</h2>

<input type="file">

<input type="text" placeholder="Full Name">

<input type="text" placeholder="Username">

<input type="password" placeholder="Password">

<select>
<option>Select Class</option>
<option>11</option>
<option>12</option>
</select>

<select>
<option>Select Stream</option>
<option>Science</option>
<option>Arts</option>
<option>Agriculture</option>
</select>

<button>Create Account</button>

</div>

</body>
</html>
